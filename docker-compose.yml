services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: arya-postgres
    environment:
      POSTGRES_USER: arya
      POSTGRES_PASSWORD: arya
      POSTGRES_DB: arya_jobs
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/scripts/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arya -d arya_jobs"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
