# Render Blueprint — Mentoria Smart Job Matcher
# Docs: docs/DEPLOY.md
#
# Prerequisites (create manually — Render Postgres lacks pgvector):
#   1. Neon Postgres (enable pgvector) → DATABASE_URL
#   2. Upstash Redis → REDIS_URL
#   3. GEMINI_API_KEY or OPENAI_API_KEY

services:
  - type: web
    name: mentoria-api
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: LLM_PROVIDER
        value: gemini
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: SENTRY_ENVIRONMENT
        value: production
      - key: LOG_JSON
        value: "true"
      - key: LOG_LEVEL
        value: INFO
      - key: BACKEND_CORS_ORIGINS
        sync: false

  - type: web
    name: mentoria-ui
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: mentoria-api
          envVarKey: RENDER_EXTERNAL_URL
